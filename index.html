<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://myekul.com/shared-assets/styles/styles.css">
    <link rel="stylesheet" href="https://myekul.com/shared-assets/myekul/myekul.css">
    <link rel="stylesheet" href="https://myekul.com/shared-assets/styles/grades.css">
    <link rel="stylesheet" href="https://myekul.com/shared-assets/cuphead/cuphead.css">
    <link rel="stylesheet" href="https://myekul.com/shared-assets/sm64/sm64.css">
    <link rel="stylesheet" href="styles/games.css">
    <link rel="stylesheet" href="styles/styles.css">
    <link id='favicon' rel="shortcut icon" href='images/favicon.png'>
    <title>Combined Leaderboard</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
    <script src="https://myekul.com/shared-assets/utils.js"></script>
    <script src="https://myekul.com/shared-assets/myekul/src.js"></script>
    <script src="https://myekul.com/shared-assets/cuphead/levels.js"></script>
    <script src="https://myekul.com/shared-assets/cuphead/inventory.js"></script>
</head>

<body>
    <div id="bodyContent" style="display:none">
        <header>
            <div id='srcGame' class="container" style="position:absolute;top:5px;left:25px"></div>
            <div class="container" style="gap:4px">
                <img id='siteIcon' src="images/favicon.png" style="height:80px;width:auto">
                <div>
                    <div class="font2" style="font-size:170%">COMBINED LEADERBOARD</div>
                    <div class='container' style="transform: translate(0px, -5px);font-size:90%;justify-content: left;">
                        <div>The best overall players across each category</div>
                        <button onclick="showTab('info');playSound('category_select')" class="grow" style="margin-left:10px;width:25px">
                            <i class="fa fa-info-circle"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <div class="sticky">
                <div id='headerRow' class="container">
                    <div id="sidebarDiv"></div>
                    <div id='modeSelection' class='container' style="display:none; margin:0">
                        <button id='fullgameButton' class='button' onclick="getFullgame()">Full Game</button>
                        <button id='levelsButton' class='button' onclick="getLevels()">Individual Levels</button>
                    </div>
                    <div style="width:70px">
                        <div id="boardTitleSrc" class="container"></div>
                    </div>
                    <input id='input_username' type='text' placeholder='Your SRC username' style='display:none;width:200px;font-size:100%;position:absolute;right:40px;top:4px;'>
                    <button id='username' onclick="showInput('username')" class='container grow' style='display:none;position:absolute;right:40px;color:white;gap:8px'>
                        Your Username...
                        <i class="fa fa-edit" style="font-size:130%"></i>
                    </button>
                </div>
                <div id='progress' style="background-color: dimgray">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="tabsDiv"></div>
                <!-- <div id='loading' style='position:absolute;right:40px;top:49px;color:white'>
                        <div>Loading API...</div>
                    </div> -->
                <button id="refreshDiv" class='grow banner' onclick="firstTimeFull=false;getFullgame();playSound('cardflip')" style="display:none;position:absolute;left:25px;top:60px;height:48px;width:48px;border-radius:50px;text-align:center">
                    <i class="fa fa-refresh" style="font-size:150%"></i>
                </button>
                <div id="spotlight" style="display:none">
                    <button id="ROTDdiv" class="grow" onclick="openModal(generateROTD(), 'RUN OF THE DAY', '', true);playSound('ready')" style="position:absolute;right:100px;top:55px;"></button>
                    <button id="spotlightDiv" class='grow' onclick="openModal(generateSpotlight(), 'DAILY SPOTLIGHT', '', true);playSound('ready')" style="position:absolute;right:20px;top:55px;"></button>
                </div>
            </div>
            <!-- Fullgame Categories -->
            <div id="fullgameCategoriesSection" class='hide' style="display:none">
                <button id='fullgameCategoriesButton' onclick="toggleSection('fullgameCategories')" class="toggleSection">
                </button>
                <div id="fullgameCategories" style="display:none">
                    <div id="cuphead_fullgameCategories" style="display:none">
                        <div class="container" style="margin:8px 0">
                            <button id='cuphead_fullgameCategories_main' onclick="getFullgame()" class="button cuphead" style="width:170px;height:30px;font-size:90%">Main Leaderboard</button>
                        </div>
                        <div class="container" style="margin-bottom:6px">
                            <button id='fullgameCategories_basegame' onclick="getFullgame('basegame')" class="button cuphead" style="width:100px">Base Game</button>
                            <button id='fullgameCategories_currentPatch' onclick="getFullgame('currentPatch')" class="button cuphead" style="width:120px">Current Patch</button>
                            <button id='fullgameCategories_trueAny' onclick="getFullgame('trueAny')" class="button cuphead" style="width:100px">True Any%</button>
                            <button class='container' style='width:15px;margin:0'>&#8226;</button>
                            <button id='fullgameCategories_simple' onclick="getFullgame('simple')" class="button simple">
                                Simple</button>
                            <button id='fullgameCategories_expert' onclick="getFullgame('expert')" class="button expert">
                                Expert</button>
                        </div>
                        <div class="container" style="margin-bottom:10px">
                            <button id='fullgameCategories_onePointOne' onclick="getFullgame('1.1+')" class="button onePointOne">
                                1.1+
                            </button>
                            <button id='fullgameCategories_legacy' onclick="getFullgame('Legacy')" class="button legacy">
                                Legacy
                            </button>
                            <button id='fullgameCategories_nmg' onclick="getFullgame('NMG')" class="button nmg">NMG
                            </button>
                            <button id='fullgameCategories_dlc' onclick="getFullgame('DLC')" class="button dlc">DLC
                            </button>
                            <button id='fullgameCategories_dlcbase' onclick="getFullgame('DLC+Base')" class="button dlcbase">DLC+Base</button>
                        </div>
                        <button id='cupheadExtraButton' onclick="toggleSection('cupheadExtra')" class="toggleSection">
                        </button>
                        <div id="cupheadExtra" style="display:none">
                            <div class="container">
                                <button id='fullgameCategories_oneGun' onclick="getFullgame('oneGun')" class="button cuphead">One Gun</button>
                                <select id="dropdown_oneGun_objective" class='oneGun' onchange="getFullgame('oneGun')">
                                    <option value="mlnxnkjq" class='cuphead' selected>Base Game</option>
                                    <option value="8104892l" class='dlc'>DLC</option>
                                    <option value="9qj3re3l" class='dlcbase'>DLC+Base</option>
                                </select>
                                <select id="dropdown_oneGun_difficulty" class='oneGun' onchange="getFullgame('oneGun')">
                                    <option value="81wmd0mq" class='simple'>Simple</option>
                                    <option value="zqoy3v51" class='regular' selected>Regular</option>
                                    <option value="013vm6rl" class='expert'>Expert</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div id="sm64_fullgameCategories" style="display:none">
                        <div class="container">
                            <button id='sm64_fullgameCategories_main' onclick="getFullgame()" class="button banner" style="width:150px">Main Leaderboard</button>
                            <button id='fullgameCategories_long' onclick="getFullgame('long')" class="button banner" style="width:100px">Long</button>
                            <button id='fullgameCategories_short' onclick="getFullgame('short')" class="button banner" style="width:100px">Short</button>
                        </div>
                    </div>
                    <div id="nsmbw_fullgameCategories" style="display:none">
                        <div class="container">
                            <button id='nsmbw_fullgameCategories_main' onclick="getFullgame()" class="button banner" style="width:150px">All Solo Categories</button>
                            <button id='fullgameCategories_main3' onclick="getFullgame('main3')" class="button banner" style="width:150px">Main 3 Categories</button>
                        </div>
                    </div>
                    <!-- <div id="tetris_fullgameCategories" style="display:none">
                        <div class="container">
                            <div id='tetris_fullgameCategories_main' onclick="getFullgame()" class="button banner"
                                style="width:100px">Pace</div>
                            <div id='fullgameCategories_all' onclick="getFullgame('tetrisAll')" class="button banner"
                                style="width:100px">All</div>
                        </div>
                    </div> -->
                </div>
            </div>
            <!-- Individual Levels -->
            <div id="ILsSection_cuphead" class='hide' style="display:none">
                <div class="container">
                    <div id='versionTabs' class='container' style="margin:0">
                        <button id='legacy' onclick="cupheadLevelSetting('legacy','nodlc')" class="button legacy" style="width:110px">Legacy 1.0
                        </button>
                        <!-- <button id='onePointOne' onclick="cupheadLevelSetting('onePointOne','nodlc')"
                            class="button onePointOne" style="width:50px">1.1</button> -->
                        <button id='currentPatch' onclick="cupheadLevelSetting('currentPatch',DLCnoDLC)" class="button cuphead">Current Patch</button>
                    </div>
                    <div>
                        <button id='cupheadILcategoriesButton' onclick="toggleSection('cupheadILcategories')" class="toggleSection"></button>
                    </div>
                    <div id='categoryTabs' class='container' style="margin:0">
                        <button id='nodlcBoards' onclick="cupheadLevelSetting(cupheadVersion,'nodlc')" class="button cuphead">Main Boards</button>
                        <button id='dlcBoards' onclick="cupheadLevelSetting('currentPatch','dlc')" class="button dlc" style="width:110px">DLC Loadout</button>
                    </div>
                </div>
                <div id="cupheadILcategories" style="display:none">
                    <div class="container">
                        <div id="ILbosses"></div>
                        <input id='checkbox_basegameILs' type="checkbox" onchange='toggleBasegameILs()' style="accent-color: var(--cupheadDLC);" checked>
                    </div>
                    <div id='difficultyTabs' class="container">
                        <div>
                            <div id='difficultyBoth' class="container">
                                <button id='simple' onclick="getDifficulty('simple')" class="button simple">
                                    Simple</button>
                                <button id='regular' onclick="getDifficulty('regular')" class="button regular">
                                    Regular</button>
                                <button id='expert' onclick="getDifficulty('expert')" class="button expert">
                                    Expert</button>
                            </div>
                            <div id='difficultyOne' class="container">
                                <button id='simpleany' onclick="specificDifficulty('simple','any')" class="button simple">
                                    Any%
                                </button>
                                <button id='simplehighest' onclick="specificDifficulty('simple', 'highest')" class="button simple">B+</button>
                                <button id='regularany' onclick="specificDifficulty('regular','any')" class="button regular">
                                    Any%</button>
                                <button id='regularhighest' onclick="specificDifficulty('regular','highest')" class="button regular">A+</button>
                                <button id='expertany' onclick="specificDifficulty('expert', 'any')" class="button expert">
                                    Any%
                                </button>
                                <button id='experthighest' onclick="specificDifficulty('expert', 'highest')" class="button expert">S-Rank</button>
                            </div>
                        </div>
                        <button id='ground' onclick="getGroundPlane('ground')" class="button"><img id='groundimg'>
                        </button>
                        <button id='plane' onclick="getGroundPlane('plane')" class="button"><img id='planeimg'></button>
                        <button id='allLevels' onclick="getAllLevels()" class='button onePointOne' style="color:white;width:50px;margin-left:10px">All
                        </button>
                    </div>
                </div>
            </div>
            <div id="ILsSection_sm64" class='hide' style="display:none">
                <button id='sm64ILcategoriesButton' onclick="toggleSection('sm64ILcategories')" class="toggleSection">
                </button>
                <div id='sm64ILcategories' style="display:none">
                    <div class="container">
                        <button id='ILdefault_sm64' onclick="getLevels()" class="button">All</button>
                    </div>
                    <div class="container">
                        <button id='Lobby' onclick="getOtherLevels('Lobby')" class="button">Lobby</button>
                        <button id='Basement' onclick="getOtherLevels('Basement')" class="button">Basement</button>
                        <button id='Upstairs' onclick="getOtherLevels('Upstairs')" class="button">Upstairs</button>
                        <button id='Tippy' onclick="getOtherLevels('Tippy')" class="button">Tippy</button>
                    </div>
                </div>
            </div>
            <div id="ILsSection_ssbm" class='hide' style="display:none">
                <div id='ILcategories_ssbm'>
                    <div class="container">
                        <button id='ILdefault_ssbm' onclick="getLevels()" class="button" style="width:50px">
                            <img src="https://myekul.com/shared-assets/images/sheets.png" style="height:20px">
                        </button>
                        <button id='ssbm_src' onclick="getOtherLevels('ssbm_src')" class="button" style="width:50px"><img src="https://myekul.com/shared-assets/images/src.png" style="height:20px"></button>
                    </div>
                </div>
            </div>
            <div id="ILsSection_ssb64" class='hide' style="display:none">
                <div id='ILcategories_ssb64'>
                    <div class="container">
                        <button id='ILdefault_ssb64' onclick="getLevels()" class="button" style="width:50px">
                            <img src="images/ssb64/target.png" style="height:20px">
                        </button>
                        <button id='boardThePlatforms' onclick="getOtherLevels('boardThePlatforms')" class="button" style="width:50px"><img src="images/ssb64/platform.png" style="height:20px"></button>
                    </div>
                </div>
            </div>
            <!-- Board Title -->
            <div id="pageTitle">
            </div>
            <div id='categorySelect' class="container" style="display:none;gap:3px">
                <button class="grow" onclick="organizePlayers(sortCategoryIndex-1)"><i class="fa fa-caret-left" style="font-size:150%"></i>
                </button>
                <div id="categoriesElem"></div>
                <button class="grow" onclick="organizePlayers(sortCategoryIndex+1)"><i class="fa fa-caret-right" style="font-size:150%"></i>
                </button>
            </div>
            <div id="boardTitleDiv" class="sticky" style="top:80px;max-width: 50%;margin:0 auto;padding:10px 0">
                <div class="container" style="max-width:50%">
                    <div class="container" style="gap:8px">
                        <div id="boardTitle"></div>
                        <button id='closeBoardTitle' class='grow' style='display:none' onclick="showDefault()"><i class="fa fa-close"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Home -->
            <div id="homeTab" class="tabs">
                <button id='home_options_button' class='options'>
                </button>
                <div id='home_options' style="display:none">
                    <div class="container">
                        <input id="checkbox_numRuns" type="checkbox"># of Runs
                        <input id="checkbox_milliseconds" type="checkbox">Milliseconds
                    </div>
                    <div class="container">
                        <input id="checkbox_flags" type="checkbox" checked>Flags
                        <input id="checkbox_icons" type="checkbox" checked>Icons
                    </div>
                    <div class="container">
                        <input id="checkbox_percentage" type="checkbox">Score
                        <input id="checkbox_grade" type="checkbox" checked>Grade
                        <input id="checkbox_place" type="checkbox" checked>Place
                        <input id="checkbox_time" type="checkbox" checked>Time
                        <input id="checkbox_year" type="checkbox">Year
                    </div>
                </div>
                <div id="home"></div>
            </div>
            <!-- WRs -->
            <div id="WRsTab" class="tabs">
                <div id="WRsTabs" class="container" style="padding:5px 0">
                    <div id='WRs_players' onclick="showWRsTab('players')" class="button">Players</div>
                    <div id='WRs_sums' onclick="showWRsTab('sums')" class="button">Sums</div>
                    <div id='WRs_chart' onclick="showWRsTab('chart')" class="button">Times</div>
                </div>
                <button id='WRs_options_button' class='options'></button>
                <div id='WRs_options' class="container" style="display:none">
                    <input id='checkbox_WRs_date' onclick="action()" type="checkbox">Date
                    <div id="WRs_cupheadILs_options" class="hide">
                        <input id='checkbox_WRs_loadouts' onclick="action()" type="checkbox" checked>Loadouts
                        <input id='checkbox_WRs_dps' onclick="action()" type="checkbox">DPS
                        <input id='checkbox_WRs_hp' onclick="action()" type="checkbox">HP
                    </div>
                </div>
                <div id="WRs"></div>
                <div id="WRsChartSection" class="hide">
                    <div id="WRsChart_options" class="container hide">
                        <select id="dropdown_WRsChart">
                            <option value="default" selected>Default</option>
                            <option value="isle">Isle</option>
                            <option value="difficulty">Difficulty</option>
                            <option value="groundPlane">Ground / Plane</option>
                        </select>
                        <input id='checkbox_hp' type="checkbox" onchange="action()">HP
                    </div>
                    <div id="WRsChart" style="height:500px;width:95%;padding:5px 0" class="container"></div>
                    <div id="WRsInfo"></div>
                </div>
            </div>
            <!-- Map -->
            <div id="mapTab" class="tabs">
                <button id='map_options_button' class='options'></button>
                <div id='map_options' class="container" style="display:none">
                    <div>
                        <input id='checkbox_map_color' onclick="action()" type="checkbox">Color
                    </div>
                    <div>
                        <input id='checkbox_map_players' onclick="action()" type="checkbox" checked>Players
                    </div>
                </div>
                <div>
                    <div>
                        <div id="mapTooltip"></div>
                        <svg id="world-map" class='container' width="1100" height="500"></svg>
                    </div>
                    <div class="container" style="padding:15px">
                        <select id="dropdown_mapMode">
                            <option value="all">Top 300</option>
                            <option value="top100" selected>Top 100</option>
                            <option value="top30">Top 30</option>
                            <option value="trophies">Trophies</option>
                            <option value="WRs">WRs</option>
                        </select>
                        <select id="dropdown_mapValue">
                            <option value="players" selected>Players</option>
                            <option value="runs">Runs</option>
                        </select>
                    </div>
                    <!-- <div class="container" style='gap:6px;margin-bottom:8px'>
                        <button class='button' onclick="zoomMap(1.5)">+</button>
                        <button class='button' onclick="zoomMap(0.75)">-</button>
                        <button class='button' onclick="resetMapZoom()">Reset</button>
                    </div> -->
                    <div class='container' style="align-items:flex-start;gap:20px">
                        <div id="flagArmy"></div>
                        <div id="countryTable"></div>
                    </div>
                </div>
            </div>
            <!-- Sort -->
            <div id="sortTab" class="tabs" style="margin-top:15px">
                <div id='sort_options' class="container">
                    <select id="dropdown_sortCriteria">
                        <optgroup label="Runs">
                            <option value="score" selected>Score</option>
                            <option value="date">Date</option>
                            <option value="category">Category</option>
                            <option value="playerIndex">Player Rank</option>
                            <option value="time">Time</option>
                        </optgroup>
                        <optgroup label="Player">
                            <option value="player">Player</option>
                            <option value="joindate">Join Date</option>
                            <option value="bestScore">Best Score</option>
                        </optgroup>
                        <optgroup id="extraSortCriteria" class='hide' label="Extra">
                            <option id='sortDPS' class='hide' value="dps">DPS</option>
                        </optgroup>
                    </select>
                    <select id="dropdown_sortRange">
                        <option value="top300" selected>Top 300</option>
                        <option value="top100">Top 100</option>
                        <option value="trophies">Trophies</option>
                        <option value="WRs">WRs</option>
                        <option value="firstWR">WRs (First)</option>
                        <option value="untiedWR">WRs (Untied)</option>
                    </select>
                </div>
                <div>
                    <select id="sortDateOptions" class="container hide" style="margin-top:5px">
                        <option value="year" selected>Year</option>
                        <!-- <option value="season">Season</option> -->
                        <option value="month">Month</option>
                        <option value="dayofyear">Day of Year</option>
                        <option value="dayofmonth">Day of Month</option>
                        <option value="dayofweek">Day of Week</option>
                    </select>
                    <div id='sortChartDiv' class="container hide" style="padding-top:5px;padding-bottom:15px;gap:10px">
                        <div id="sortChart" style="width:70%;height:300px"></div>
                        <div id="sortPieChart" class='hide' style="width:20%;height:300px"></div>
                    </div>
                    <div class="container">
                        <div id="sort" style="width:50%"></div>
                    </div>
                </div>
            </div>
            <div id="content"></div>
        </main>
        <footer></footer>
    </div>
    <script type='module' src="code/api/firebase.js"></script>
    <script src="code/api/sheets.js"></script>
    <script src="code/api/src.js"></script>

    <script src="code/mode/fullgame.js"></script>
    <script src="code/mode/levels.js"></script>

    <script src="code/elements/modal/modal.js"></script>
    <script src="code/elements/modal/reportCard.js"></script>
    <script src="code/elements/modal/spotlight.js"></script>

    <script src="code/elements/boardtitle.js"></script>

    <script src="constants/cuphead/constants.js"></script>
    <script src="constants/cuphead/bossInfo.js"></script>
    <script src="constants/cuphead/myekulSays.js"></script>
    <script src="constants/other.js"></script>

    <script src="code/tab/home.js"></script>
    <script src="code/tab/featured.js"></script>
    <script src="code/tab/leaderboards.js"></script>
    <script src="code/tab/WRs.js"></script>
    <script src="code/tab/map.js"></script>
    <script src="code/tab/sort.js"></script>
    <script src="code/tab/connect4.js"></script>
    <script src="code/tab/ballpit.js"></script>
    <script src="code/tab/info.js"></script>

    <script src="code/cupheadLevels.js"></script>

    <script src="code/math.js"></script>
    <script src="code/general.js"></script>
    <script src="code/important.js"></script>
    <script src="code/player.js"></script>
    <script src="code/fancy.js"></script>
    <script src="code/supporters.js"></script>

    <script src="code/generation.js"></script>

    <script src="code/variables.js"></script>
    <script src="code/startup.js"></script>

    <script src="code/eventListeners.js"></script>

    <script src="code/main.js"></script>
</body>

</html>
